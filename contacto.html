<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nexus Gaming | Contacto</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: Arial; margin: 0; }
        nav { background-color: #161b22; padding: 20px; text-align: center; border-bottom: 2px solid #00d4ff; }
        nav a { color: white; text-decoration: none; margin: 0 15px; }

        .formulario-caja {
            max-width: 400px;
            margin: 50px auto;
            background-color: #161b22;
            padding: 30px;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background-color: #0d1117;
            color: white;
            border: 1px solid #333;
            border-radius: 5px;
        }

        button {
            background-color: #00d4ff;
            color: black;
            border: none;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">INICIO</a>
        <a href="productos.html">PRODUCTOS</a>
        <a href="contacto.html">CONTACTO</a>
    </nav>

    <div class="formulario-caja">
        <h2>Contáctanos</h2>
        <form>
            <label>Nombre Completo:</label>
            <input type="text" placeholder="Ej. Brayan canaza">

            <label>Correo Electrónico:</label>
            <input type="email" placeholder="canazabrayan@gmail.com">

            <label>Consulta:</label>
            <textarea rows="4"></textarea>

            <button type="submit">ENVIAR MENSAJE</button>
        </form>
    </div>

</body>
</html>
